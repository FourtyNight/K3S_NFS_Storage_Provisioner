apiVersion: v1
kind: Service
metadata:
  name: {{ include "nfs-storage.fullname" . }}
  labels:
    {{- include "nfs-storage.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 2049
      protocol: TCP
      name: nfs
  selector:
    {{- include "nfs-storage.selectorLabels" . | nindent 4 }}
