apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-pv
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/FourtyNight/K3S_NFS_Storage_Provisioner.git'  # ЗАМЕНИТЕ
    targetRevision: HEAD
    path: charts/nfs-pv
  destination:
    server: https://kubernetes.default.svc
    namespace: nfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
