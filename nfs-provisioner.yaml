apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-provisioner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
    chart: nfs-subdir-external-provisioner
    targetRevision: 4.0.18   # используйте актуальную версию
    helm:
      values: |
        nfs:
          server: nfs-server.nfs-system.svc.cluster.local
          path: /exports
        storageClass:
          name: nfs-storage
          defaultClass: false
        # если нужно, можно настроить ресурсы провижинера
        # resources:
        #   requests:
        #     cpu: 100m
        #     memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: nfs-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
