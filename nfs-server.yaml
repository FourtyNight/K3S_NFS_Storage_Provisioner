apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:FourtyNight/K3S_NFS_Storage_Provisioner.git'  # ЗАМЕНИТЕ
    targetRevision: HEAD
    path: charts/nfs-server
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
