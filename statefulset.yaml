apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nfs-storage.fullname" . }}
  labels:
    {{- include "nfs-storage.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "nfs-storage.fullname" . }}
  selector:
    matchLabels:
      {{- include "nfs-storage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nfs-storage.selectorLabels" . | nindent 8 }}
    spec:
      # Контейнеру нужны привилегии для работы NFS
      securityContext:
        fsGroup: 65534
        runAsUser: 0
      containers:
        - name: nfs-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 2049
              name: nfs
          securityContext:
            privileged: true
          env:
            - name: SHARED_DIRECTORY
              value: {{ .Values.nfs.exportPath | quote }}
          # Монтируем PVC в папку экспорта
          volumeMounts:
            - name: data
              mountPath: {{ .Values.nfs.exportPath }}
          # Проверка готовности – проверяем, что процесс rpc.statd запущен
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mount -t nfs localhost:/ /mnt && umount /mnt"
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "ps aux | grep -q rpc.statd"
            initialDelaySeconds: 30
            periodSeconds: 60
      # Используем созданный PVC
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.storageSize }}
        # можно указать storageClassName, если нужно
        # storageClassName: local-path
